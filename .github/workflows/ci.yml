name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          out=$(gofmt -l . | grep -v '^tools/' || true)
          if [ -n "$out" ]; then
            echo "gofmt-dirty:" >&2
            echo "$out" >&2
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  # The protocol package is the source of truth for the wire contract; the
  # drift check guarantees agent-sdk-typescript and agent-sdk-python keep
  # type definitions whose field names match the Go structs here. A failing
  # diff means either this PR is missing TS/Python mirror updates or this
  # PR shouldn't change the wire shape at all. See tools/check_drift.py for
  # what's checked and how to extend it.
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: check drift against agent-sdk-typescript and agent-sdk-python
        run: python3 tools/check_drift.py --local go --from-github
